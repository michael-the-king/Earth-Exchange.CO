<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - Earth Exchange</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<header>
    <img src="836a9584-4a99-4065-9003-ccdf7f8345f1-removebg-preview.png" alt="Earth Exchange Logo" class="logo">
    <h1>Earth Exchange</h1>
    <p class="slogan">Recycle your bottles, earn real rewards</p>


    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">Our Mission</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="rewards.html">Rewards</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>


<main>
    <section class="contact-section">
        <h2>Contact Us</h2>
        <p>If you have any questions, feel free to send us a message below.</p>


        <form>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>


            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>


            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Type your message..." rows="5" required></textarea>


            <button type="submit">Send Message</button>
        </form>
    </section>
</main>


<footer>
    <p>© 2026 Earth Exchange. All rights reserved.</p>
</footer>


</body>
</html>
